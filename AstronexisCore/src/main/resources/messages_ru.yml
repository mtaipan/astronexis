help:
  privates:
    - "§e§lПриваты (WorldGuard + WorldEdit)"
    - "§7(1) Выделение региона (WorldEdit):"
    - "§f//wand §7— топорик выделения"
    - "§7ЛКМ — pos1, ПКМ — pos2"
    - "§7(2) Создать приват:"
    - "§f/rg claim <name>"
    - "§7(3) Инфа/список:"
    - "§f/rg info <name>"
    - "§f/rg list"
    - "§7(4) Добавить/убрать людей:"
    - "§f/rg addmember <name> <nick>"
    - "§f/rg removemember <name> <nick>"
    - "§f/rg addowner <name> <nick>"
    - "§f/rg removeowner <name> <nick>"
    - "§7(5) Удалить приват:"
    - "§f/rg remove <name>"
    - "§7Подсказка: названия без пробелов, лучше латиницей."

  commands:
    - "§e§lКоманды сервера (база)"
    - "§7Меню:"
    - "§f/menu"
    - "§7Хом/тп:"
    - "§f/sethome"
    - "§f/home"
    - "§f/spawn"
    - "§f/tpa <nick>"
    - "§f/tpaccept"
    - "§f/tpdeny"
    - "§7Миры:"
    - "§f/mv list"
    - "§f/mv tp <world>"