<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      data-bs-theme="dark"
      th:fragment="layout(title, active, content)">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Astronexis</title>

    <link rel="icon" th:href="@{/img/favicon.png}">

    <!-- Bootstrap (иначе всё “голое”) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>

<body>
<div class="bg-ambient"></div>

<div class="container py-4">
    <div th:replace="~{fragments/navbar :: navbar(${active})}"></div>

    <main class="mt-4" th:replace="${content}"></main>

    <div class="mt-5" th:replace="~{fragments/footer :: footer}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<script th:src="@{/js/site.js}"></script>
</body>
</html>
