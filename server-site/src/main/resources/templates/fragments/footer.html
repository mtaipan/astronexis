<footer th:fragment="footer" class="small text-secondary d-flex flex-column gap-2 mt-4">
    <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center">
        <div>
            <span th:text="${site.title}">Astronexis</span>
            <span class="mx-2">•</span>
            <span>© <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2026</span></span>
        </div>

        <div class="d-flex gap-3">
            <a class="link-secondary" th:href="@{/offer}">Оферта</a>
            <a class="link-secondary" th:href="@{/privacy}">Конфиденциальность</a>
            <a class="link-secondary" th:href="@{/contacts}">Поддержка</a>
        </div>
    </div>

    <div class="mt-1 small text-secondary">
        <span th:text="${site.payeeType}">Самозанятый (НПД)</span>
        • <span th:text="${site.payeeName}">ФИО плательщика</span>
        • ИНН <span th:text="${site.payeeInn}">000000000000</span>
        • <a class="link-secondary"
             th:href="'mailto:' + ${site.supportEmail}"
             th:text="${site.supportEmail}">support@astronexis.site</a>
    </div>
</footer>
