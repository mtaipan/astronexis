server.port=8080

# --- DB (локально) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/server_site}
spring.datasource.username=${DB_USERNAME:server_site}
spring.datasource.password=${DB_PASSWORD:server_site}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# --- YooKassa ---
# username = shopId, password = secretKey (HTTP Basic)
# Все значения — из переменных окружения. НЕ коммитить реальные секреты.
yookassa.webhook-token=${YOOKASSA_WEBHOOK_TOKEN:}
yookassa.shop-id=${YOOKASSA_SHOP_ID:}
yookassa.secret-key=${YOOKASSA_SECRET_KEY:}
yookassa.return-url-base=${site.base-url}/pay/return
yookassa.return-url=${site.base-url}/pay/return

# --- MVP currency: показываем любую валюту, но в YooKassa отправляем RUB
fx.usd-to-rub=77.19
fx.eur-to-rub=91.23
fx.kzt-to-rub=0.15

# --- VIP ---
vip.price-rub=199.00
vip.group-name=${VIP_GROUP:VIP}
vip.duration-days=${VIP_DURATION_DAYS:30}

# --- Выдача VIP по RCON (см. RconProperties) ---
# Если rcon.enabled=false — гранты копятся в очереди vip_grants для плагина/ручной выдачи.
rcon.enabled=${RCON_ENABLED:false}
rcon.host=${RCON_HOST:127.0.0.1}
rcon.port=${RCON_PORT:25575}
rcon.password=${RCON_PASSWORD:}
rcon.vip-command=${RCON_VIP_COMMAND:lp user %nick% parent addtemp %group% %days%d accumulate}
rcon.max-attempts=${RCON_MAX_ATTEMPTS:10}

